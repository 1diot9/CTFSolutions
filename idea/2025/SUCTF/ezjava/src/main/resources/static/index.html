<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JDBC Access</title>
</head>
<body>
<h1>JDBC Access Form</h1>
<form action="/jdbc" method="post">
    <label for="host">Host:</label>
    <input type="text" id="host" name="host" required><br><br>

    <label for="port">Port:</label>
    <input type="number" id="port" name="port" required><br><br>

    <label for="database">Database:</label>
    <input type="text" id="database" name="database" required><br><br>

    <label for="extraParams">Extra Params:</label>
    <input type="text" id="extraParams" name="extraParams" placeholder='{"a":"b"}'><br><br>

    <label for="username">Username:</label>
    <input type="text" id="username" name="username" required><br><br>

    <label for="password">Password:</label>
    <input type="password" id="password" name="password" required><br><br>

    <input type="submit" value="Submit">
</form>
</body>
</html>
