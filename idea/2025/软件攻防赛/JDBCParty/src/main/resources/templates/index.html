<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>JDBCParty</title>
    <!-- 引入 Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- 自定义样式 -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">JDBCParty</a>
    </div>
</nav>
<div class="container mt-5">
    <h2 class="text-center mb-4">ConnectionTest</h2>
    <div class="row justify-content-center">
        <div class="col-md-8">
            <form id="dbtestForm">
                <div class="mb-3">
                    <label for="data" class="form-label">DatabaseUser</label>
                    <textarea class="form-control" id="data" name="data" rows="5" placeholder="Please input your data" required></textarea>
                    <div id="dataHelp" class="form-text">Please input your data</div>
                </div>
                <button type="submit" class="btn btn-primary w-100">submit</button>
            </form>
            <div id="result" class="mt-4"></div>
        </div>
    </div>
</div>
<!-- 引入 Bootstrap JS 和依赖 -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- 自定义脚本 -->
<script th:src="@{/js/scripts.js}"></script>
</body>
</html>
